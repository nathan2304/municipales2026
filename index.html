<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Résultats municipales 2026</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f7fb;
margin:0;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.panel{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.status{
font-weight:bold;
}

.stats{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-bottom:20px;
}

.stat{
background:#f3f6fb;
padding:15px;
border-radius:10px;
text-align:center;
}

.stat-title{
font-size:12px;
color:#666;
}

.stat-value{
font-size:18px;
font-weight:bold;
margin-top:5px;
}

.results{
margin-top:10px;
}

.result{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #eee;
}

.map{
margin-top:30px;
text-align:center;
}

.region{
cursor:pointer;
fill:#ddd;
stroke:white;
stroke-width:2;
}

.region:hover{
fill:#bbb;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
background:#2f5cff;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1f47c8;
}

</style>
</head>

<body>

<div class="container">

<div class="panel">

<div class="header">

<div>
<strong id="title">Résultats nationaux</strong><br>
<span class="status">Résultats en cours</span>
</div>

<div>
Dernière mise à jour : <span id="time"></span>
</div>

</div>

<div class="stats">

<div class="stat">
<div class="stat-title">Inscrits</div>
<div class="stat-value">0</div>
</div>

<div class="stat">
<div class="stat-title">Votants</div>
<div class="stat-value">0</div>
</div>

<div class="stat">
<div class="stat-title">Participation</div>
<div class="stat-value">0,0 %</div>
</div>

<div class="stat">
<div class="stat-title">Participation à 17h</div>
<div class="stat-value">48,90 %</div>
</div>

<div class="stat">
<div class="stat-title">Taux estimé à 20h</div>
<div class="stat-value">57,6 %</div>
</div>

</div>

<div id="back" style="display:none;">
<button onclick="national()">← Retour résultats nationaux</button>
</div>

<div class="results" id="results">

<div class="result"><span>Divers droite</span><span>0,0 %</span></div>
<div class="result"><span>Gauche</span><span>0,0 %</span></div>
<div class="result"><span>Rassemblement national</span><span>0,0 %</span></div>
<div class="result"><span>Majorité présidentielle</span><span>0,0 %</span></div>
<div class="result"><span>Divers centre</span><span>0,0 %</span></div>
<div class="result"><span>Autres</span><span>0,0 %</span></div>

</div>

</div>

<div class="panel map">

<h3 id="mapTitle">Carte des régions</h3>

<svg width="400" height="300">

<rect class="region" x="20" y="40" width="80" height="60" onclick="region('Bretagne')"/>
<rect class="region" x="110" y="30" width="80" height="60" onclick="region('Normandie')"/>
<rect class="region" x="200" y="20" width="80" height="60" onclick="region('Hauts-de-France')"/>
<rect class="region" x="300" y="40" width="80" height="80" onclick="region('Grand Est')"/>

<rect class="region" x="100" y="100" width="80" height="70" onclick="region('Pays de la Loire')"/>
<rect class="region" x="190" y="100" width="80" height="70" onclick="region('Centre-Val de Loire')"/>
<rect class="region" x="150" y="70" width="60" height="40" onclick="region('Île-de-France')"/>

<rect class="region" x="260" y="120" width="80" height="80" onclick="region('Bourgogne-Franche-Comté')"/>

<rect class="region" x="60" y="180" width="120" height="90" onclick="region('Nouvelle-Aquitaine')"/>

<rect class="region" x="200" y="180" width="120" height="90" onclick="region('Occitanie')"/>

<rect class="region" x="320" y="200" width="60" height="60" onclick="region('PACA')"/>

</svg>

</div>

</div>

<script>

function updateTime(){
let d=new Date()
document.getElementById("time").innerText=d.toLocaleTimeString()
}

updateTime()

function region(name){

document.getElementById("title").innerText="Résultats — "+name

document.getElementById("back").style.display="block"

}

function national(){

document.getElementById("title").innerText="Résultats nationaux"

document.getElementById("back").style.display="none"

}

</script>

</body>
</html>
